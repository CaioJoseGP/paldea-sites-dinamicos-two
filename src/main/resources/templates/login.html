<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paldea Jardim - acesso ao painel comercial.">
    <title>Paldea Jardim | Entrar</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    
    <header class="navbar">
        <div class="container nav-container">
            <a class="brand" th:href="@{/catalogo}">
                <span>Paldea</span>
                <small style="color: var(--text-muted); font-weight: 400; font-size: 0.8rem; text-transform: uppercase;">Botanica Contemporanea</small>
            </a>
            <nav class="nav-links">
                <a class="nav-item" th:href="@{/catalogo}">Catalogo</a>
                <a class="nav-item" th:href="@{/plantas}">Gestao</a>
                <span class="nav-item visit-counter" th:text="'Visitas: ' + ${totalVisitas}">Visitas: 1</span>
            </nav>
        </div>
    </header>

    <main class="centered-layout">
        <div class="login-wrapper">
            <div class="login-header">
                <h1>Painel Comercial</h1>
                <p>Acesse o painel para gerenciar o catalogo da loja.</p>
            </div>

            <div class="glass-panel">
                <div class="alert alert-danger" th:if="${feedbackMessage}">
                    <span th:text="${feedbackMessage}">Mensagem de retorno.</span>
                </div>

                <form th:action="@{/login}" th:object="${loginForm}" method="post">
                    <div class="form-group">
                        <label for="email" class="form-label">E-mail Corporativo</label>
                        <input id="email" type="email" class="form-control" th:field="*{email}" placeholder="email@empresa.com">
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="senha" class="form-label">Senha</label>
                        <input id="senha" type="password" class="form-control" th:field="*{senha}" placeholder="••••••••">
                    </div>

                    <button class="btn btn-primary btn-block" type="submit">Acessar Sistema</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
